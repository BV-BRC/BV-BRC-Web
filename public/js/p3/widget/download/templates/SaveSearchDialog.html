<div class="saveSearchDialog">
  <div class="dialogContent">
    <div class="formSection">
      <label for="searchName">Search Name:</label>
      <input type="text" id="searchName" class="searchNameInput"
             data-dojo-attach-point="nameInput"
             placeholder="Enter a name for this search">
      <div class="duplicateWarning dijitHidden" data-dojo-attach-point="duplicateWarning">
        <i class="fa fa-exclamation-triangle"></i>
        A search with this name already exists. Saving will overwrite it.
      </div>
    </div>

    <div class="formSection">
      <label>Data Type:</label>
      <span class="dataTypeValue" data-dojo-attach-point="dataTypeNode">-</span>
    </div>

    <div class="formSection">
      <label>Query:</label>
      <div class="queryPreview" data-dojo-attach-point="queryPreviewNode">
        (no query)
      </div>
    </div>

    <div class="formSection dijitHidden" data-dojo-attach-point="recordCountSection">
      <label>Records:</label>
      <span class="recordCountValue" data-dojo-attach-point="recordCountNode">0</span>
    </div>

    <div class="formSection">
      <label for="searchTags">Tags (optional):</label>
      <input type="text" id="searchTags" class="tagsInput"
             data-dojo-attach-point="tagsInput"
             placeholder="Enter tags separated by commas">
    </div>

    <div class="formSection workspaceSection">
      <label class="checkboxLabel">
        <input type="checkbox" data-dojo-attach-point="workspaceCheckbox">
        Also save to workspace
      </label>
    </div>

    <div class="formSection workspacePathSection dijitHidden" data-dojo-attach-point="workspacePathSection">
      <label for="workspacePath">Workspace Path:</label>
      <input type="text" id="workspacePath" class="workspacePathInput"
             data-dojo-attach-point="workspacePathInput"
             placeholder="/username/home/saved_searches/">
    </div>
  </div>

  <div class="dialogActions">
    <button type="button" class="cancelButton" data-dojo-attach-point="cancelButton"
            data-dojo-attach-event="onClick:_onCancel">
      Cancel
    </button>
    <button type="button" class="saveButton" data-dojo-attach-point="saveButton"
            data-dojo-attach-event="onClick:_onSave">
      <i class="fa fa-save"></i> Save Search
    </button>
  </div>
</div>
